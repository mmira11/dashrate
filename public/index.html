<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>DashRate</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
  :root {
    --bg: #0b0e14;
    --surface: #161a24;
    --surface-2: #1e2330;
    --text: #f2f3f7;
    --text-dim: #9aa0ac;
    --accent: #8b5cf6;
    --green: #2fd675;
    --red: #ff4d5e;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: 88px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; position: sticky; top: 0; background: var(--bg); z-index: 10;
  }
  header h1 { font-size: 20px; margin: 0; letter-spacing: -0.3px; }
  .brand { display: flex; align-items: center; gap: 9px; }
  .brand svg { display: block; }
  .icon-btn {
    background: var(--surface); border: none; color: var(--text);
    width: 40px; height: 40px; border-radius: 12px; font-size: 18px;
  }
  main { padding: 0 16px; }
  .view { display: none; animation: fadeIn 0.2s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px);} to { opacity: 1; transform: translateY(0);} }
  .card {
    background: var(--surface); border-radius: var(--radius);
    padding: 16px; margin-bottom: 12px;
    border: 1px solid #1f2434;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .card h3 {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-dim); margin: 0 0 12px;
  }
  .preview-row span:last-child { font-variant-numeric: tabular-nums; font-weight: 600; }
  .stat-value, .hero-rate { font-variant-numeric: tabular-nums; }
  .card-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 10px; }
  .card-actions button {
    background: var(--surface-2); border: none; color: var(--text);
    font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 9px;
  }
  .card-actions button.danger { color: var(--red); }
  .segmented {
    display: flex; background: var(--surface); border: 1px solid #1f2434;
    border-radius: 12px; padding: 4px; margin-bottom: 12px;
  }
  .segmented button {
    flex: 1; border: none; background: none; color: var(--text-dim);
    padding: 8px 0; border-radius: 9px; font-size: 14px; font-weight: 600;
  }
  .segmented button.active { background: var(--surface-2); color: var(--text); }
  .empty-state { text-align: center; color: var(--text-dim); font-size: 14px; padding: 24px 16px; }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  .sheet::before {
    content: ''; display: block; width: 36px; height: 4px; border-radius: 2px;
    background: #2a2f3d; margin: 0 auto 14px;
  }
  .sheet h2 { font-size: 18px; margin: 0 0 4px; }
  .sheet-section {
    font-size: 12px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--accent); margin: 22px 0 2px;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
  label { display: block; font-size: 13px; color: var(--text-dim); margin: 12px 0 6px; }
  input, select {
    width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #2a2f3d;
    background: var(--surface-2); color: var(--text); font-size: 16px;
  }
  .btn-primary {
    width: 100%; padding: 16px; border: none; border-radius: 14px;
    background: var(--accent); color: white; font-size: 17px; font-weight: 600;
    margin-top: 16px;
  }
  .btn-secondary {
    width: 100%; padding: 14px; border: none; border-radius: 14px;
    background: var(--surface-2); color: var(--text); font-size: 15px; font-weight: 600;
    margin-top: 10px;
  }
  .preview-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 15px; }
  .preview-row .label { color: var(--text-dim); }
  .flag-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
  .flag-green { background: var(--green); }
  .flag-red { background: var(--red); }
  .session-card { border-left: 4px solid var(--text-dim); }
  .session-card.green { border-left-color: var(--green); }
  .session-card.red { border-left-color: var(--red); }
  nav.tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex;
    background: var(--surface); border-top: 1px solid #23283a;
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  nav.tabbar button {
    flex: 1; background: none; border: none; color: var(--text-dim);
    font-size: 11px; font-weight: 600; padding: 6px 0 2px;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  nav.tabbar button svg { display: block; }
  nav.tabbar button.active { color: var(--accent); }
  .hero-card { text-align: center; padding: 28px 16px 24px; }
  .hero-label { font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
  .hero-rate { font-size: 56px; font-weight: 700; letter-spacing: -1.5px; margin: 6px 0 12px; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 16px; border-radius: 999px;
    font-size: 14px; font-weight: 600;
    background: var(--surface-2); color: var(--text-dim);
  }
  .status-pill.green { background: rgba(47,214,117,0.14); color: var(--green); }
  .status-pill.red { background: rgba(255,77,94,0.14); color: var(--red); }
  .stats-row { display: flex; gap: 10px; }
  .stats-row .card { flex: 1; text-align: center; padding: 14px 8px; }
  .stat-value { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .btn-log-new { padding: 20px; font-size: 18px; }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .hero-delta { font-size: 14px; font-weight: 600; margin-top: 10px; color: var(--text-dim); }
  .backup-line { text-align: center; font-size: 12px; color: var(--text-dim); margin-top: 14px; }
  .toast {
    position: fixed; left: 16px; right: 16px; bottom: 84px;
    background: var(--surface-2); border-radius: 12px; padding: 12px 16px;
    display: none; align-items: center; justify-content: space-between;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5); z-index: 30;
    font-size: 15px; animation: fadeIn 0.2s ease;
  }
  .toast.active { display: flex; }
  .toast button { background: none; border: none; color: var(--accent); font-weight: 600; font-size: 15px; padding: 4px 8px; }
  .sheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    display: none; align-items: flex-end; z-index: 20;
  }
  .sheet-overlay.active { display: flex; }
  .sheet {
    background: var(--surface); width: 100%; border-radius: 20px 20px 0 0;
    padding: 20px; max-height: 85vh; overflow-y: auto;
  }
  .week-switcher { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .week-switcher button { background: var(--surface-2); border: none; color: var(--text); width: 40px; height: 40px; border-radius: 10px; font-size: 16px; }
  .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 140px; padding: 12px 4px 0; }
  .bar-chart .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .bar-chart .bar { width: 100%; max-width: 32px; border-radius: 6px 6px 0 0; background: #3a3f4d; }
  .bar-chart .bar.green { background: var(--green); }
  .bar-chart .bar.red { background: var(--red); }
  .bar-chart .bar-value { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
  .bar-chart .bar-label { font-size: 11px; color: var(--text-dim); margin-top: 6px; text-align: center; }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <svg width="22" height="22" viewBox="0 0 512 512" aria-hidden="true">
        <polyline points="72,380 200,268 288,330 420,182" fill="none" stroke="#8b5cf6" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="420" cy="182" r="46" fill="#2fd675"/>
      </svg>
      <h1>DashRate</h1>
    </div>
    <button class="icon-btn" id="settings-btn" aria-label="Settings">&#9881;</button>
  </header>
  <main>
    <section id="home-view" class="view active">
      <div class="card hero-card">
        <div class="hero-label">This week &middot; blended $/hr</div>
        <div class="hero-rate" id="home-rate">$0.00</div>
        <span class="status-pill" id="home-status">No sessions yet</span>
        <div class="hero-delta" id="home-delta"></div>
      </div>
      <div class="stats-row">
        <div class="card"><div class="stat-value" id="home-sessions">0</div><div class="stat-label">Sessions</div></div>
        <div class="card"><div class="stat-value" id="home-hours">0.0</div><div class="stat-label">Hours</div></div>
        <div class="card"><div class="stat-value" id="home-net">$0.00</div><div class="stat-label">Net pay</div></div>
      </div>
      <button class="btn-primary btn-log-new" id="log-new-btn">+ Log New Session</button>
      <div class="backup-line" id="home-backup"></div>
    </section>
    <section id="log-view" class="view">
      <div class="card">
        <label for="log-date">Date</label>
        <input type="date" id="log-date">

        <label for="log-vehicle">Vehicle</label>
        <select id="log-vehicle">
          <option value="Tesla">Tesla</option>
          <option value="Jeep">Jeep</option>
        </select>

        <label for="log-start">Start time</label>
        <input type="time" id="log-start">

        <label for="log-end">End time</label>
        <input type="time" id="log-end">

        <label for="log-active">Active minutes</label>
        <input type="number" inputmode="numeric" id="log-active" placeholder="0">

        <label for="log-miles">Miles driven</label>
        <input type="number" step="0.1" inputmode="decimal" id="log-miles" placeholder="0">

        <label for="log-dd-pay">DoorDash pay ($)</label>
        <input type="number" step="0.01" inputmode="decimal" id="log-dd-pay" placeholder="0">

        <label for="log-tips">Tips ($)</label>
        <input type="number" step="0.01" inputmode="decimal" id="log-tips" placeholder="0">
      </div>

      <div class="card" id="log-preview">
        <div class="preview-row"><span class="label">Net pay</span><span id="preview-net">$0.00</span></div>
        <div class="preview-row"><span class="label">$/hr active</span><span id="preview-rate-active">$0.00</span></div>
        <div class="preview-row"><span class="label">$/hr total</span><span id="preview-rate-total">$0.00</span></div>
        <div class="preview-row"><span class="label">Worth it?</span><span id="preview-flag"><span class="flag-dot"></span>&mdash;</span></div>
      </div>

      <button class="btn-primary" id="save-session-btn">Save Session</button>
      <button class="btn-secondary" id="cancel-edit-btn" style="display:none;">Cancel</button>
    </section>
    <section id="history-view" class="view">
      <div class="segmented" id="period-toggle">
        <button class="active" data-period="week">Week</button>
        <button data-period="month">Month</button>
      </div>
      <div class="week-switcher">
        <button id="week-prev" aria-label="Previous period">&#9664;</button>
        <div id="week-label">This week</div>
        <button id="week-next" aria-label="Next period">&#9654;</button>
      </div>
      <div class="card" id="weekly-summary"></div>
      <div class="card">
        <h3>Daily +/-</h3>
        <div id="daily-net"></div>
      </div>
      <div id="session-list"></div>
    </section>
    <section id="analytics-view" class="view">
      <div class="card">
        <h3>Best time to dash</h3>
        <div class="bar-chart" id="chart-bucket"></div>
      </div>
      <div class="card">
        <h3>By day of week</h3>
        <div class="bar-chart" id="chart-dow"></div>
      </div>
      <div class="card">
        <h3>Weekly trend</h3>
        <div class="bar-chart" id="chart-trend"></div>
      </div>
      <div class="card">
        <h3>Tesla vs Jeep</h3>
        <div class="bar-chart" id="chart-vehicle"></div>
      </div>
    </section>
  </main>
  <nav class="tabbar">
    <button id="tab-home" class="active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>
      <span>Home</span>
    </button>
    <button id="tab-log">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      <span>Log</span>
    </button>
    <button id="tab-history">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      <span>History</span>
    </button>
    <button id="tab-analytics">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M5 20v-8M12 20V5M19 20v-11"/></svg>
      <span>Analytics</span>
    </button>
  </nav>
  <div class="sheet-overlay" id="settings-overlay">
    <div class="sheet" id="settings-sheet">
      <h2>Settings</h2>
      <div class="sheet-section">Vehicle costs</div>
      <label for="set-tesla-cost">Tesla cost per mile ($)</label>
      <input type="number" step="0.001" inputmode="decimal" id="set-tesla-cost">

      <label for="set-jeep-mode">Jeep cost mode</label>
      <select id="set-jeep-mode">
        <option value="calculated">Calculate from MPG + gas price</option>
        <option value="override">Manual override</option>
      </select>

      <label for="set-jeep-mpg">Jeep MPG</label>
      <input type="number" step="0.1" inputmode="decimal" id="set-jeep-mpg">

      <label for="set-gas-price">Gas price ($/gal)</label>
      <input type="number" step="0.01" inputmode="decimal" id="set-gas-price">

      <label for="set-jeep-override">Jeep cost per mile override ($)</label>
      <input type="number" step="0.001" inputmode="decimal" id="set-jeep-override">

      <div class="sheet-section">Worth it</div>
      <label for="set-threshold">Worth-it threshold ($/hr)</label>
      <input type="number" step="0.5" inputmode="decimal" id="set-threshold">

      <div class="sheet-section">Backup &amp; data</div>
      <label for="set-gist-token">GitHub token (Gists scope)</label>
      <input type="password" id="set-gist-token" placeholder="paste once, stored locally">

      <label for="set-gist-id">Gist ID (for import on a new device)</label>
      <input type="text" id="set-gist-id" placeholder="paste from another device's export">

      <button class="btn-primary" id="settings-save-btn">Save Settings</button>
      <button class="btn-secondary" id="export-gist-btn">Export to Gist</button>
      <button class="btn-secondary" id="import-gist-btn">Import from Gist</button>
      <button class="btn-secondary" id="export-csv-btn">Download CSV</button>
      <div id="gist-status" style="font-size:13px;color:var(--text-dim);margin-top:8px;"></div>
    </div>
  </div>
  <div class="toast" id="undo-toast">
    <span id="undo-toast-msg">Session deleted</span>
    <button id="undo-btn">Undo</button>
  </div>
  <script src="./calc.js?v=6"></script>
  <script>
  (function () {
    'use strict';

    var SESSIONS_KEY = 'dashrate_sessions';
    var SETTINGS_KEY = 'dashrate_settings';
    var GIST_TOKEN_KEY = 'dashrate_gist_token';
    var GIST_ID_KEY = 'dashrate_gist_id';
    var LAST_BACKUP_KEY = 'dashrate_last_backup';

    var DEFAULT_SETTINGS = {
      teslaCostPerMile: 0.045,
      jeepMode: 'calculated',
      jeepMpg: 18,
      gasPrice: 3.50,
      jeepCostPerMileOverride: 0.2,
      worthItThreshold: 18,
      lastVehicle: 'Tesla'
    };

    function getSettings() {
      var raw = localStorage.getItem(SETTINGS_KEY);
      if (!raw) return Object.assign({}, DEFAULT_SETTINGS);
      return Object.assign({}, DEFAULT_SETTINGS, JSON.parse(raw));
    }

    function saveSettings(settings) {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    }

    function getSessions() {
      var raw = localStorage.getItem(SESSIONS_KEY);
      return raw ? JSON.parse(raw) : [];
    }

    function saveSessions(sessions) {
      localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
    }

    // --- TAB NAVIGATION ---
    var tabHomeBtn = document.getElementById('tab-home');
    var tabLogBtn = document.getElementById('tab-log');
    var tabHistoryBtn = document.getElementById('tab-history');
    var tabAnalyticsBtn = document.getElementById('tab-analytics');
    var homeView = document.getElementById('home-view');
    var logView = document.getElementById('log-view');
    var historyView = document.getElementById('history-view');
    var analyticsView = document.getElementById('analytics-view');

    function showTab(name) {
      homeView.classList.toggle('active', name === 'home');
      logView.classList.toggle('active', name === 'log');
      historyView.classList.toggle('active', name === 'history');
      analyticsView.classList.toggle('active', name === 'analytics');
      tabHomeBtn.classList.toggle('active', name === 'home');
      tabLogBtn.classList.toggle('active', name === 'log');
      tabHistoryBtn.classList.toggle('active', name === 'history');
      tabAnalyticsBtn.classList.toggle('active', name === 'analytics');
      if (name === 'home') renderHome();
      if (name === 'history') renderHistory();
      if (name === 'analytics') renderAnalytics();
    }

    tabHomeBtn.addEventListener('click', function () { showTab('home'); });
    tabLogBtn.addEventListener('click', function () { showTab('log'); });
    tabHistoryBtn.addEventListener('click', function () { showTab('history'); });
    tabAnalyticsBtn.addEventListener('click', function () { showTab('analytics'); });
    document.getElementById('log-new-btn').addEventListener('click', function () { showTab('log'); });

    // --- SETTINGS SHEET ---
    var settingsBtn = document.getElementById('settings-btn');
    var settingsOverlay = document.getElementById('settings-overlay');

    function fillSettingsForm() {
      var s = getSettings();
      document.getElementById('set-tesla-cost').value = s.teslaCostPerMile;
      document.getElementById('set-jeep-mode').value = s.jeepMode;
      document.getElementById('set-jeep-mpg').value = s.jeepMpg;
      document.getElementById('set-gas-price').value = s.gasPrice;
      document.getElementById('set-jeep-override').value = s.jeepCostPerMileOverride;
      document.getElementById('set-threshold').value = s.worthItThreshold;
      document.getElementById('set-gist-token').value = localStorage.getItem(GIST_TOKEN_KEY) || '';
      document.getElementById('set-gist-id').value = localStorage.getItem(GIST_ID_KEY) || '';
    }

    settingsBtn.addEventListener('click', function () {
      fillSettingsForm();
      settingsOverlay.classList.add('active');
    });

    settingsOverlay.addEventListener('click', function (event) {
      if (event.target === settingsOverlay) settingsOverlay.classList.remove('active');
    });

    document.getElementById('settings-save-btn').addEventListener('click', function () {
      var settings = {
        teslaCostPerMile: parseFloat(document.getElementById('set-tesla-cost').value) || 0,
        jeepMode: document.getElementById('set-jeep-mode').value,
        jeepMpg: parseFloat(document.getElementById('set-jeep-mpg').value) || 0,
        gasPrice: parseFloat(document.getElementById('set-gas-price').value) || 0,
        jeepCostPerMileOverride: parseFloat(document.getElementById('set-jeep-override').value) || 0,
        worthItThreshold: parseFloat(document.getElementById('set-threshold').value) || 0,
        lastVehicle: getSettings().lastVehicle
      };
      saveSettings(settings);
      var token = document.getElementById('set-gist-token').value.trim();
      if (token) localStorage.setItem(GIST_TOKEN_KEY, token);
      else localStorage.removeItem(GIST_TOKEN_KEY);
      var gistId = document.getElementById('set-gist-id').value.trim();
      if (gistId) localStorage.setItem(GIST_ID_KEY, gistId);
      else localStorage.removeItem(GIST_ID_KEY);
      settingsOverlay.classList.remove('active');
      showToast('Settings saved');
      if (homeView.classList.contains('active')) renderHome();
    });

    // --- SERVICE WORKER ---
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }

    function todayDateString() {
      var d = new Date();
      return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
    }

    function pad2(n) {
      return n < 10 ? '0' + n : '' + n;
    }

    var MONTH_NAMES = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    function shortDate(dateStr) {
      var parts = dateStr.split('-');
      return MONTH_NAMES[parseInt(parts[1], 10) - 1].slice(0, 3) + ' ' + parseInt(parts[2], 10);
    }

    function dayLabel(dateStr) {
      return DashRateCalc.dayOfWeek(dateStr).slice(0, 3) + ', ' + shortDate(dateStr);
    }

    var logDate = document.getElementById('log-date');
    var logVehicle = document.getElementById('log-vehicle');
    var logStart = document.getElementById('log-start');
    var logEnd = document.getElementById('log-end');
    var logActive = document.getElementById('log-active');
    var logMiles = document.getElementById('log-miles');
    var logDdPay = document.getElementById('log-dd-pay');
    var logTips = document.getElementById('log-tips');

    function currentCostPerMile(settings, vehicle) {
      return vehicle === 'Tesla' ? settings.teslaCostPerMile : DashRateCalc.computeJeepCostPerMile(settings);
    }

    function updatePreview() {
      var settings = getSettings();
      var vehicle = logVehicle.value;
      var session = {
        startTime: logStart.value || '00:00',
        endTime: logEnd.value || '00:00',
        activeMinutes: parseFloat(logActive.value) || 0,
        miles: parseFloat(logMiles.value) || 0,
        ddPay: parseFloat(logDdPay.value) || 0,
        tips: parseFloat(logTips.value) || 0,
        costPerMileSnapshot: currentCostPerMile(settings, vehicle),
        thresholdSnapshot: settings.worthItThreshold
      };
      var result = DashRateCalc.computeSession(session);
      document.getElementById('preview-net').textContent = '$' + result.netPay.toFixed(2);
      document.getElementById('preview-rate-active').textContent = '$' + result.rateActive.toFixed(2);
      document.getElementById('preview-rate-total').textContent = '$' + result.rateTotal.toFixed(2);
      var flagEl = document.getElementById('preview-flag');
      flagEl.innerHTML = '<span class="flag-dot flag-' + result.flag + '"></span>' + (result.flag === 'green' ? 'Worth it' : 'Not worth it');
    }

    [logStart, logEnd, logActive, logMiles, logDdPay, logTips, logVehicle].forEach(function (el) {
      el.addEventListener('input', updatePreview);
    });

    var editingSessionId = null;

    function resetLogForm() {
      var settings = getSettings();
      logDate.value = todayDateString();
      logVehicle.value = settings.lastVehicle;
      logStart.value = '';
      logEnd.value = '';
      logActive.value = '';
      logMiles.value = '';
      logDdPay.value = '';
      logTips.value = '';
      updatePreview();
    }

    function fillFormFromSession(session) {
      logDate.value = session.date;
      logVehicle.value = session.vehicle;
      logStart.value = session.startTime;
      logEnd.value = session.endTime;
      logActive.value = session.activeMinutes;
      logMiles.value = session.miles;
      logDdPay.value = session.ddPay;
      logTips.value = session.tips;
      updatePreview();
    }

    function startEditingSession(id) {
      var match = getSessions().filter(function (s) { return s.id === id; });
      if (!match.length) return;
      editingSessionId = id;
      fillFormFromSession(match[0]);
      document.getElementById('save-session-btn').textContent = 'Update Session';
      document.getElementById('cancel-edit-btn').style.display = 'block';
      showTab('log');
    }

    function stopEditingSession() {
      editingSessionId = null;
      document.getElementById('save-session-btn').textContent = 'Save Session';
      document.getElementById('cancel-edit-btn').style.display = 'none';
    }

    document.getElementById('save-session-btn').addEventListener('click', function () {
      var settings = getSettings();
      var vehicle = logVehicle.value;
      var sessionData = {
        date: logDate.value || todayDateString(),
        vehicle: vehicle,
        startTime: logStart.value || '00:00',
        endTime: logEnd.value || '00:00',
        activeMinutes: parseFloat(logActive.value) || 0,
        miles: parseFloat(logMiles.value) || 0,
        ddPay: parseFloat(logDdPay.value) || 0,
        tips: parseFloat(logTips.value) || 0,
        costPerMileSnapshot: currentCostPerMile(settings, vehicle),
        thresholdSnapshot: settings.worthItThreshold
      };
      settings.lastVehicle = vehicle;
      saveSettings(settings);

      var sessions = getSessions();
      if (editingSessionId) {
        var editedId = editingSessionId;
        sessions = sessions.map(function (s) {
          if (s.id !== editedId) return s;
          sessionData.id = s.id;
          return sessionData;
        });
        saveSessions(sessions);
        stopEditingSession();
        resetLogForm();
        showTab('history');
        showToast('Session updated');
      } else {
        sessionData.id = String(Date.now());
        sessions.push(sessionData);
        saveSessions(sessions);
        resetLogForm();
        showToast('Session saved');
      }
      scheduleAutoBackup();
    });

    document.getElementById('cancel-edit-btn').addEventListener('click', function () {
      stopEditingSession();
      resetLogForm();
      showTab('history');
    });
    var currentWeekAnchor = (function () {
      var sessions = getSessions();
      if (!sessions.length) return todayDateString();
      // Same ordering as renderHistory()'s sort: most-recent-first by date + startTime.
      return sessions.reduce(function (latest, s) {
        return (s.date + s.startTime) > (latest.date + latest.startTime) ? s : latest;
      }).date;
    })();

    var periodMode = 'week';

    function currentPeriodRange() {
      return periodMode === 'week'
        ? DashRateCalc.getWeekRange(currentWeekAnchor)
        : DashRateCalc.getMonthRange(currentWeekAnchor);
    }

    function periodLabel(range) {
      if (periodMode === 'month') {
        var parts = range.start.split('-');
        return MONTH_NAMES[parseInt(parts[1], 10) - 1] + ' ' + parts[0];
      }
      return shortDate(range.start) + ' – ' + shortDate(range.end);
    }

    document.querySelectorAll('#period-toggle button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        periodMode = btn.getAttribute('data-period');
        document.querySelectorAll('#period-toggle button').forEach(function (b) {
          b.classList.toggle('active', b === btn);
        });
        renderHistory();
      });
    });

    function renderHome() {
      var settings = getSettings();
      var range = DashRateCalc.getWeekRange(todayDateString());
      var weekSessions = getSessions().filter(function (s) {
        return s.date >= range.start && s.date <= range.end;
      });
      var summary = DashRateCalc.summarizeSessions(weekSessions);
      document.getElementById('home-rate').textContent = '$' + summary.blendedRate.toFixed(2);
      document.getElementById('home-sessions').textContent = weekSessions.length;
      document.getElementById('home-hours').textContent = summary.totalHours.toFixed(1);
      document.getElementById('home-net').textContent = '$' + summary.totalNet.toFixed(2);
      var statusEl = document.getElementById('home-status');
      if (!weekSessions.length) {
        statusEl.className = 'status-pill';
        statusEl.innerHTML = 'No sessions yet this week';
      } else if (summary.blendedRate >= settings.worthItThreshold) {
        statusEl.className = 'status-pill green';
        statusEl.innerHTML = '<span class="flag-dot flag-green"></span>Worth it this week';
      } else {
        statusEl.className = 'status-pill red';
        statusEl.innerHTML = '<span class="flag-dot flag-red"></span>Below $' + settings.worthItThreshold + '/hr';
      }

      var deltaEl = document.getElementById('home-delta');
      var trend = DashRateCalc.weeklyTrend(getSessions(), 2, todayDateString());
      if (trend[0].hasData && trend[1].hasData) {
        var diff = trend[1].blendedRate - trend[0].blendedRate;
        deltaEl.className = 'hero-delta ' + (diff >= 0 ? 'pos' : 'neg');
        deltaEl.textContent = (diff >= 0 ? '▲ +$' : '▼ −$') + Math.abs(diff).toFixed(2) + '/hr vs last week';
      } else {
        deltaEl.className = 'hero-delta';
        deltaEl.textContent = '';
      }

      var backupEl = document.getElementById('home-backup');
      if (!localStorage.getItem(GIST_TOKEN_KEY)) {
        backupEl.textContent = 'Auto-backup off — add a GitHub token in Settings';
      } else {
        var lastBackup = localStorage.getItem(LAST_BACKUP_KEY);
        backupEl.textContent = lastBackup
          ? 'Backed up ' + new Date(lastBackup).toLocaleString()
          : 'Auto-backup on — runs after your next save';
      }
    }

    function renderSessionCard(session) {
      var result = DashRateCalc.computeSession(session);
      return '<div class="card session-card ' + result.flag + '">' +
        '<div class="preview-row"><span>' + dayLabel(session.date) + ' &middot; ' + session.vehicle + '</span><span>' + session.startTime + '&ndash;' + session.endTime + '</span></div>' +
        '<div class="preview-row"><span class="label">Net</span><span>$' + result.netPay.toFixed(2) + '</span></div>' +
        '<div class="preview-row"><span class="label">$/hr total</span><span>$' + result.rateTotal.toFixed(2) + '</span></div>' +
        '<div class="preview-row"><span class="label">$/mile</span><span>$' + result.ratePerMile.toFixed(2) + '</span></div>' +
        '<div class="card-actions">' +
        '<button data-edit-id="' + session.id + '">Edit</button>' +
        '<button class="danger" data-delete-id="' + session.id + '">Delete</button>' +
        '</div></div>';
    }

    function renderHistory() {
      var sessions = getSessions().slice().sort(function (a, b) {
        return (b.date + b.startTime).localeCompare(a.date + a.startTime);
      });

      var range = currentPeriodRange();
      document.getElementById('week-label').textContent = periodLabel(range);

      var weekSessions = sessions.filter(function (s) { return s.date >= range.start && s.date <= range.end; });
      var summary = DashRateCalc.summarizeSessions(weekSessions);
      var totalMiles = weekSessions.reduce(function (acc, s) { return acc + (s.miles || 0); }, 0);
      var ratePerMile = totalMiles > 0 ? summary.totalNet / totalMiles : 0;
      document.getElementById('weekly-summary').innerHTML =
        '<div class="preview-row"><span class="label">Gross</span><span>$' + summary.totalGross.toFixed(2) + '</span></div>' +
        '<div class="preview-row"><span class="label">Net</span><span>$' + summary.totalNet.toFixed(2) + '</span></div>' +
        '<div class="preview-row"><span class="label">Hours</span><span>' + summary.totalHours.toFixed(1) + '</span></div>' +
        '<div class="preview-row"><span class="label">Blended $/hr</span><span>$' + summary.blendedRate.toFixed(2) + '</span></div>' +
        '<div class="preview-row"><span class="label">$/mile</span><span>$' + ratePerMile.toFixed(2) + '</span></div>';

      renderDailyNet(weekSessions);
      document.getElementById('session-list').innerHTML = weekSessions.length
        ? weekSessions.map(renderSessionCard).join('')
        : '<div class="card empty-state">No sessions this ' + periodMode + '. Log one to see it here.</div>';

      document.querySelectorAll('[data-edit-id]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          startEditingSession(btn.getAttribute('data-edit-id'));
        });
      });

      document.querySelectorAll('[data-delete-id]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var id = btn.getAttribute('data-delete-id');
          var all = getSessions();
          var deleted = all.filter(function (s) { return s.id === id; })[0];
          saveSessions(all.filter(function (s) { return s.id !== id; }));
          renderHistory();
          if (deleted) showToast('Session deleted', deleted);
          scheduleAutoBackup();
        });
      });
    }

    function renderDailyNet(weekSessions) {
      var days = DashRateCalc.breakdownByDate(weekSessions);
      var el = document.getElementById('daily-net');
      if (!days.length) {
        el.innerHTML = '<div class="preview-row"><span class="label">No sessions this week</span></div>';
        return;
      }
      el.innerHTML = days.map(function (d) {
        var cls = d.net >= 0 ? 'pos' : 'neg';
        var sign = d.net >= 0 ? '+' : '−';
        var label = dayLabel(d.date) +
          ' · ' + d.sessionCount + (d.sessionCount === 1 ? ' session' : ' sessions') +
          ' · ' + d.hours.toFixed(1) + 'h';
        return '<div class="preview-row"><span class="label">' + label + '</span>' +
          '<span class="' + cls + '">' + sign + '$' + Math.abs(d.net).toFixed(2) + '</span></div>';
      }).join('');
    }

    var undoToastEl = document.getElementById('undo-toast');
    var pendingUndoSession = null;
    var undoToastTimer = null;

    function showToast(message, undoSession) {
      document.getElementById('undo-toast-msg').textContent = message;
      document.getElementById('undo-btn').style.display = undoSession ? 'block' : 'none';
      pendingUndoSession = undoSession || null;
      undoToastEl.classList.add('active');
      clearTimeout(undoToastTimer);
      undoToastTimer = setTimeout(hideUndoToast, undoSession ? 6000 : 2500);
    }

    function hideUndoToast() {
      undoToastEl.classList.remove('active');
      pendingUndoSession = null;
    }

    document.getElementById('undo-btn').addEventListener('click', function () {
      if (!pendingUndoSession) return;
      var sessions = getSessions();
      sessions.push(pendingUndoSession);
      saveSessions(sessions);
      hideUndoToast();
      renderHistory();
      scheduleAutoBackup();
    });

    function shiftPeriod(direction) {
      var parts = currentWeekAnchor.split('-').map(Number);
      var d = periodMode === 'week'
        ? new Date(parts[0], parts[1] - 1, parts[2] + direction * 7)
        : new Date(parts[0], parts[1] - 1 + direction, 1);
      currentWeekAnchor = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
      renderHistory();
    }

    document.getElementById('week-prev').addEventListener('click', function () { shiftPeriod(-1); });
    document.getElementById('week-next').addEventListener('click', function () { shiftPeriod(1); });

    function renderBarChart(containerId, items) {
      var threshold = getSettings().worthItThreshold;
      var maxValue = items.reduce(function (max, item) {
        return item.hasData && item.value > max ? item.value : max;
      }, 0);
      var html = items.map(function (item) {
        var heightPct = item.hasData && maxValue > 0 ? Math.max(4, (item.value / maxValue) * 100) : 4;
        var barClass = !item.hasData ? '' : (item.value >= threshold ? 'green' : 'red');
        var valueLabel = item.hasData ? '$' + item.value.toFixed(2) : '—';
        return '<div class="bar-col">' +
          '<div class="bar-value">' + valueLabel + '</div>' +
          '<div class="bar ' + barClass + '" style="height:' + heightPct + '%"></div>' +
          '<div class="bar-label">' + item.label + '</div>' +
          '</div>';
      }).join('');
      document.getElementById(containerId).innerHTML = html;
    }

    function renderBucketChart(sessions) {
      var breakdown = DashRateCalc.breakdownByBucket(sessions);
      var items = ['morning', 'afternoon', 'evening'].map(function (bucket) {
        var value = breakdown[bucket];
        return {
          label: bucket.charAt(0).toUpperCase() + bucket.slice(1),
          value: value === null ? 0 : value,
          hasData: value !== null
        };
      });
      renderBarChart('chart-bucket', items);
    }

    function renderDowChart(sessions) {
      var breakdown = DashRateCalc.breakdownByDayOfWeek(sessions);
      var order = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
      var items = order.map(function (day) {
        var value = breakdown[day];
        return { label: day.slice(0, 3), value: value === null ? 0 : value, hasData: value !== null };
      });
      renderBarChart('chart-dow', items);
    }

    function renderTrendChart(sessions) {
      var trend = DashRateCalc.weeklyTrend(sessions, 8, todayDateString());
      var items = trend.map(function (week) {
        return { label: week.weekStart.slice(5), value: week.blendedRate, hasData: week.hasData };
      });
      renderBarChart('chart-trend', items);
    }

    function renderVehicleChart(sessions) {
      var breakdown = DashRateCalc.breakdownByVehicle(sessions);
      var items = ['Tesla', 'Jeep'].map(function (vehicle) {
        var value = breakdown[vehicle];
        return { label: vehicle, value: value === null ? 0 : value, hasData: value !== null };
      });
      renderBarChart('chart-vehicle', items);
    }

    function renderAnalytics() {
      var sessions = getSessions();
      renderBucketChart(sessions);
      renderDowChart(sessions);
      renderTrendChart(sessions);
      renderVehicleChart(sessions);
    }

    function requireToken() {
      var token = localStorage.getItem(GIST_TOKEN_KEY);
      if (!token) {
        token = document.getElementById('set-gist-token').value.trim();
        if (token) localStorage.setItem(GIST_TOKEN_KEY, token);
      }
      return token;
    }

    function setGistStatus(message) {
      document.getElementById('gist-status').textContent = message;
    }

    function exportToGist() {
      var token = requireToken();
      if (!token) { setGistStatus('Enter a GitHub token above first.'); return; }
      var payload = { sessions: getSessions(), settings: getSettings() };
      var body = {
        description: 'DashRate data export',
        public: false,
        files: { 'dashrate-data.json': { content: JSON.stringify(payload, null, 2) } }
      };
      var gistId = localStorage.getItem(GIST_ID_KEY);
      var url = gistId ? 'https://api.github.com/gists/' + gistId : 'https://api.github.com/gists';
      var method = gistId ? 'PATCH' : 'POST';
      setGistStatus('Exporting…');
      fetch(url, {
        method: method,
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      }).then(function (response) {
        if (!response.ok) throw new Error('GitHub API returned ' + response.status);
        return response.json();
      }).then(function (data) {
        localStorage.setItem(GIST_ID_KEY, data.id);
        localStorage.setItem(LAST_BACKUP_KEY, new Date().toISOString());
        document.getElementById('set-gist-id').value = data.id;
        setGistStatus('Exported to Gist ' + data.id + ' at ' + new Date().toLocaleTimeString());
        if (homeView.classList.contains('active')) renderHome();
      }).catch(function (error) {
        setGistStatus('Export failed: ' + error.message);
      });
    }

    var autoBackupTimer = null;

    function scheduleAutoBackup() {
      if (!localStorage.getItem(GIST_TOKEN_KEY)) return;
      clearTimeout(autoBackupTimer);
      autoBackupTimer = setTimeout(exportToGist, 8000);
    }

    function exportCsv() {
      var columns = ['date', 'vehicle', 'startTime', 'endTime', 'loggedMinutes', 'activeMinutes',
        'miles', 'ddPay', 'tips', 'gross', 'vehicleCost', 'net', 'ratePerHourTotal', 'ratePerHourActive', 'ratePerMile', 'worthIt'];
      var rows = getSessions().slice().sort(function (a, b) {
        return (a.date + a.startTime).localeCompare(b.date + b.startTime);
      }).map(function (s) {
        var c = DashRateCalc.computeSession(s);
        return [s.date, s.vehicle, s.startTime, s.endTime, c.totalLoggedMinutes, s.activeMinutes,
          s.miles, s.ddPay.toFixed(2), s.tips.toFixed(2), c.grossPay.toFixed(2), c.energyCost.toFixed(2),
          c.netPay.toFixed(2), c.rateTotal.toFixed(2), c.rateActive.toFixed(2), c.ratePerMile.toFixed(2),
          c.flag === 'green' ? 'yes' : 'no'].join(',');
      });
      var csv = columns.join(',') + '\n' + rows.join('\n') + '\n';
      var file = new File([csv], 'dashrate-sessions.csv', { type: 'text/csv' });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ files: [file], title: 'DashRate sessions' }).catch(function () {});
        return;
      }
      var link = document.createElement('a');
      link.href = URL.createObjectURL(file);
      link.download = 'dashrate-sessions.csv';
      document.body.appendChild(link);
      link.click();
      setTimeout(function () {
        document.body.removeChild(link);
        URL.revokeObjectURL(link.href);
      }, 1000);
    }

    document.getElementById('export-csv-btn').addEventListener('click', exportCsv);

    function importFromGist() {
      var token = requireToken();
      var gistId = localStorage.getItem(GIST_ID_KEY) || document.getElementById('set-gist-id').value.trim();
      if (!token) { setGistStatus('Enter a GitHub token above first.'); return; }
      if (!gistId) { setGistStatus('No Gist ID set — paste the one from your other device above.'); return; }
      localStorage.setItem(GIST_ID_KEY, gistId);
      setGistStatus('Importing…');
      fetch('https://api.github.com/gists/' + gistId, {
        headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }
      }).then(function (response) {
        if (!response.ok) throw new Error('GitHub API returned ' + response.status);
        return response.json();
      }).then(function (data) {
        if (!data.files || !data.files['dashrate-data.json']) {
          throw new Error('that Gist has no dashrate-data.json file — check the Gist ID');
        }
        var content = data.files['dashrate-data.json'].content;
        var payload = JSON.parse(content);
        saveSessions(payload.sessions || []);
        saveSettings(Object.assign({}, DEFAULT_SETTINGS, payload.settings || {}));
        setGistStatus('Imported ' + (payload.sessions || []).length + ' sessions.');
        fillSettingsForm();
        renderHome();
        renderHistory();
        renderAnalytics();
        resetLogForm();
        stopEditingSession();
      }).catch(function (error) {
        setGistStatus('Import failed: ' + error.message);
      });
    }

    document.getElementById('export-gist-btn').addEventListener('click', exportToGist);
    document.getElementById('import-gist-btn').addEventListener('click', importFromGist);

    resetLogForm();
    var requestedTab = new URLSearchParams(location.search).get('tab');
    showTab(['log', 'history', 'analytics'].indexOf(requestedTab) !== -1 ? requestedTab : 'home');
  })();
  </script>
</body>
</html>
